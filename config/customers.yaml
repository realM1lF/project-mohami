# Mohami KI-Mitarbeiter - Customer Configuration
# 
# RICHTIGER WORKFLOW:
# 1. Kunde konfiguriert hier seine Daten
# 2. Agent ruft WorkspaceManager.setup_workspace()
# 3. Repo wird geklont nach ~/ki-data/workspaces/{customer}/
# 4. Wenn has_ddev=true: DDEV startet im geklonten Repo
# 5. Agent arbeitet lokal, committet und pusht zurück
#
# KEIN hardcoded DDEV mehr! Der KI-Mitarbeiter klont Repos!

version: "2.0"

# Template für neue Kunden (kopieren und anpassen)
# 
# Neues Format: `repositories` Liste (empfohlen)
# Legacy-Format: `repo_url` String (wird automatisch konvertiert)
#
# template:
#   id: "customer-id"
#   name: "Customer Name"
#   repositories:
#     - repo: "owner/repo-name"          # GitHub-Format: owner/repo
#       default_branch: "main"
#       tech_stack: { type: "python", version: "3.11" }
#     - repo: "owner/another-repo"
#       default_branch: "develop"
#       tech_stack: { type: "php", version: "8.2", framework: "shopware" }

# Aktive Kundenkonfigurationen
customers:
  test-customer:
    id: test-customer
    name: "Test Customer"
    repositories:
      - repo: "realM1lF/personal-ki-agents"
        default_branch: "main"
        tech_stack: { type: "python", version: "3.11" }

  # Beispiel: Python Projekt mit DDEV
  # python-project:
  #   id: python-project
  #   name: "Python Project"
  #   git_provider: github
  #   repo_url: https://github.com/example/python-project
  #   has_ddev: true  # Repo enthält .ddev/config.yaml
  #   default_branch: main
  #   workspace_path: ~/ki-data/workspaces/python-project
  #   
  #   tech_stack:
  #     type: python
  #     version: "3.11"
  #     framework: django

  # Beispiel: Shopware/PHP Projekt mit DDEV
  # shopware-customer:
  #   id: shopware-customer
  #   name: "Shopware Customer"
  #   git_provider: github
  #   repo_url: https://github.com/example/shopware-shop
  #   has_ddev: true
  #   default_branch: main
  #   workspace_path: ~/ki-data/workspaces/shopware-customer
  #   
  #   tech_stack:
  #     type: php
  #     version: "8.2"
  #     framework: shopware
  #   
  #   test_config:
  #     command: "vendor/bin/phpunit"
  #     directory: "html"

  # Beispiel: Bitbucket Repository
  # bitbucket-customer:
  #   id: bitbucket-customer
  #   name: "Bitbucket Customer"
  #   git_provider: bitbucket
  #   repo_url: https://bitbucket.org/workspace/repository
  #   has_ddev: false
  #   default_branch: master
  #   workspace_path: ~/ki-data/workspaces/bitbucket-customer
  #   auth_token: null  # BITBUCKET_TOKEN
  #   
  #   tech_stack:
  #     type: node
  #     version: "18"
  #     framework: react

# Legacy-Format (wird für Abwärtskompatibilität unterstützt)
# Alte Konfigurationen mit 'ddev:', 'shopware:', etc. werden automatisch
# in das neue Format konvertiert

# System-Einstellungen
system:
  # Basis-Pfad für alle Workspaces
  base_workspace_path: ~/ki-data/workspaces
  
  # Standard-Timeout für Git-Operationen (Sekunden)
  git_timeout: 600
  
  # Standard-Timeout für DDEV-Befehle (Sekunden)
  ddev_timeout: 300
  
  # Automatisches Starten von DDEV wenn .ddev/config.yaml existiert
  auto_start_ddev: true
  
  # Automatisches Pull vor Arbeit
  auto_pull: true
  
  # Backup vor Code-Änderungen
  backup_before_changes: true
  backup_retention_days: 7
